version: "1.0"

# Política inicial curada a partir do AWS Gate. Ela privilegia descoberta e
# leitura operacional. Revise conforme a classificação de dados da sua conta.

deny:
  - "secretsmanager get-secret-value"
  - "secretsmanager batch-get-secret-value"
  - "ecr get-login-password"
  - "ecr get-authorization-token"
  - "eks get-token"
  - "ecs execute-command"
  - "lambda invoke"
  - "glue get-connection"
  - "glue get-connections"

accept:
  # S3: cp é a exceção de escrita herdada do AWS Gate.
  - "s3 ls"
  - "s3 cp"

  - "sts get-caller-identity"

  - "ec2 describe-instances"
  - "ec2 describe-images"
  - "ec2 describe-security-groups"
  - "ec2 describe-subnets"
  - "ec2 describe-vpcs"
  - "ec2 describe-route-tables"
  - "ec2 describe-volumes"
  - "ec2 describe-snapshots"
  - "ec2 describe-tags"
  - "ec2 describe-regions"
  - "ec2 describe-availability-zones"

  # get-function e configuration podem expor variáveis de ambiente.
  - "lambda list-functions"
  - "lambda get-function"
  - "lambda get-function-configuration"
  - "lambda list-aliases"
  - "lambda get-alias"
  - "lambda list-versions-by-function"
  - "lambda list-event-source-mappings"
  - "lambda get-event-source-mapping"
  - "lambda list-layers"
  - "lambda list-layer-versions"
  - "lambda get-policy"
  - "lambda get-account-settings"
  - "lambda list-tags"

  - "stepfunctions list-state-machines"
  - "stepfunctions describe-state-machine"
  - "stepfunctions describe-state-machine-for-execution"
  - "stepfunctions list-executions"
  - "stepfunctions describe-execution"
  - "stepfunctions get-execution-history"
  - "stepfunctions list-activities"
  - "stepfunctions describe-activity"
  - "stepfunctions list-map-runs"
  - "stepfunctions describe-map-run"
  - "stepfunctions list-tags-for-resource"

  - "logs describe-log-groups"
  - "logs describe-log-streams"
  - "logs get-log-events"
  - "logs filter-log-events"
  - "logs tail"
  - "logs get-log-group-fields"
  - "logs get-query-results"
  - "logs describe-queries"
  - "logs describe-metric-filters"

  - "ecs list-clusters"
  - "ecs describe-clusters"
  - "ecs list-services"
  - "ecs describe-services"
  - "ecs list-tasks"
  - "ecs describe-tasks"
  - "ecs list-task-definitions"
  - "ecs describe-task-definition"
  - "ecs list-container-instances"
  - "ecs describe-container-instances"

  - "ecr describe-repositories"
  - "ecr list-images"
  - "ecr describe-images"
  - "ecr describe-image-scan-findings"
  - "ecr get-repository-policy"
  - "ecr describe-registry"
  - "ecr list-tags-for-resource"

  # Secrets Manager: somente metadados.
  - "secretsmanager list-secrets"
  - "secretsmanager describe-secret"
  - "secretsmanager get-resource-policy"
  - "secretsmanager list-secret-version-ids"

  # Glue sem conexões, que podem conter senha.
  - "glue get-databases"
  - "glue get-database"
  - "glue get-tables"
  - "glue get-table"
  - "glue list-jobs"
  - "glue get-jobs"
  - "glue get-job"
  - "glue get-job-runs"
  - "glue get-job-run"
  - "glue list-crawlers"
  - "glue get-crawlers"
  - "glue get-crawler"
  - "glue get-triggers"
  - "glue get-trigger"
  - "glue list-workflows"
  - "glue get-workflow"

  # EKS sem emissão de token.
  - "eks list-clusters"
  - "eks describe-cluster"
  - "eks list-nodegroups"
  - "eks describe-nodegroup"
  - "eks list-fargate-profiles"
  - "eks describe-fargate-profile"
  - "eks list-addons"
  - "eks describe-addon"
  - "eks list-updates"
  - "eks describe-update"

  # Remova se parâmetros puderem conter segredos na sua conta.
  - "ssm describe-parameters"
  - "ssm get-parameter"
  - "ssm get-parameters"
  - "ssm get-parameters-by-path"
  - "ssm get-parameter-history"
